### model
model_name_or_path: InternVL3_5-14B-HF
adapter_name_or_path: outputs/neuro_sft_lora_internvl35_14b
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
quantization_bit: 4
pref_loss: sigmoid
pref_beta: 0.1

### dataset
dataset: neuro_uncensored_dpo_en
dataset_dir: D:/AzusaFish/Codes/Development/Project-Avis/Tuning/LLaMa_Factory/datasets
template: intern_vl
cutoff_len: 320
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 1

### output
output_dir: outputs/neuro_dpo_lora_internvl35_14b
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_total_limit: 3

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 48
learning_rate: 2e-06
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
flash_attn: auto
gradient_checkpointing: true
dataloader_num_workers: 0

### eval
val_size: 0.02
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 200
