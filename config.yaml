# Project Avis unified configuration (single source of truth)
# Format rule: flat KEY: value pairs (no nested blocks)

# Launcher behavior
TTS_PROVIDER: kokoro
KOKORO_VOICE: jf_alpha
KOKORO_LANG: en-us
KOKORO_SPEED: 1.0
GPU_ID: 0
CLEAN_PORTS: 1

# App
APP_NAME: neuro_core
APP_ENV: dev
APP_HOST: 0.0.0.0
APP_PORT: 8080

# LLM backend
LLM_PROVIDER: gguf
LLM_BASE_URL: http://127.0.0.1:8001/v1
LLM_MODEL: Qwen/Qwen2.5-14B-Instruct-GPTQ-Int4
LLM_API_KEY: EMPTY
LLM_TEMPERATURE: 0.7
LLM_TOP_P: 0.95
LLM_STREAM: true
LLM_MAX_CONTEXT: 8192
LLM_MAX_OUTPUT: 512
ASSISTANT_STREAM_CHUNK_CHARS: 12
ASSISTANT_STREAM_INTERVAL_MS: 25
LLM_DEBUG_TO_FRONTEND: true

# GGUF / llama.cpp(OpenAI-compatible server)
GGUF_BASE_URL: http://127.0.0.1:8081/v1
GGUF_MODEL: Avis_ver1.gguf
GGUF_MODEL_PATH: ./Model/Avis_ver1.gguf
GGUF_THREADS: 10
GGUF_N_GPU_LAYERS: 99
GGUF_CTX: 8192
GGUF_MAIN_GPU: 0
GGUF_CHAT_TEMPLATE: chatml

# Ollama
OLLAMA_BASE_URL: http://127.0.0.1:11434
OLLAMA_MODEL: qwen2.5:14b
OLLAMA_TIMEOUT_SEC: 60
OLLAMA_MODELS_DIR: %USERPROFILE%/.ollama/models

# Token budget policy
CONTEXT_RESERVED_FOR_RESPONSE: 700
CONTEXT_RESERVED_FOR_TOOLS: 800

# TTS / STT / OCR / Vision
TTS_BASE_URL: http://127.0.0.1:9880
TTS_PROFILE_PATH: ./configs/tts_profiles.yaml
TTS_DEFAULT_SPEAKER: atri
TTS_STREAMING_MODE: true

GPT_SOVITS_BASE_URL: http://127.0.0.1:9880

KOKORO_BASE_URL: http://127.0.0.1:9880
KOKORO_MODEL: kokoro
KOKORO_RESPONSE_FORMAT: wav
KOKORO_MODEL_PATH: ./assets/kokoro/kokoro-v1.0.onnx
KOKORO_VOICES_PATH: ./assets/kokoro/voices-v1.0.bin
KOKORO_CHUNK_CHARS: 180
KOKORO_MIN_CHUNK_CHARS: 24

STT_BASE_URL: http://127.0.0.1:9000
STT_PROVIDER: http
STT_CONTROL_WS_URL: ws://127.0.0.1:8011
STT_DATA_WS_URL: ws://127.0.0.1:8012
OCR_BASE_URL: http://127.0.0.1:9001
VISION_BASE_URL: http://127.0.0.1:9002

# Local repositories
GPT_SOVITS_REPO: ../GPT-SoVITS-main/GPT-SoVITS-main
KOKORO_REPO: .
REALTIMESTT_REPO: ../RealtimeSTT-master/RealtimeSTT-master
REFERENCE_CORE_REPO: ../Z/reference-core-main

# Bridges
WECHAT_BRIDGE_URL: http://127.0.0.1:9015
WECHAT_BRIDGE_PROVIDER: itchat
GEWECHAT_BASE_URL: https://api.geweapi.com/gewe/v2/api
GEWECHAT_TOKEN:
GEWECHAT_APP_ID:
GEWECHAT_ATS: []
STS_BRIDGE_URL: http://127.0.0.1:9011
SEARCH_API_URL: http://127.0.0.1:9012/search

# Memory
SQLITE_PATH: ./data/memory.db
CHROMA_PATH: ./data/chroma
PERSONA_COLLECTION: persona_lines
MEMORY_COLLECTION: long_term_memory

# Runtime
AGENT_TICK_INTERVAL_SEC: 0.2
PROACTIVE_SILENCE_SEC: 300

# Context Compression (pseudo KV compression)
KV_COMPRESS_ENABLED: true
KV_COMPRESS_TRIGGER_TOKENS: 2600
KV_COMPRESS_KEEP_LAST_TURNS: 8
KV_COMPRESS_SOURCE_MESSAGES: 60
KV_COMPRESS_MIN_TURNS: 6

# Async memory reflection
MEMORY_REFLECT_ENABLED: true
MEMORY_REFLECT_POLL_SEC: 45
MEMORY_REFLECT_TURN_INTERVAL: 100
MEMORY_REFLECT_DAILY_HOUR: 3
MEMORY_REFLECT_MAX_SCAN: 260
MEMORY_REFLECT_MAX_NOTES: 12
MEMORY_RECALL_TOP_K: 4

# STT bridge runtime
STT_BRIDGE_HOST: 127.0.0.1
STT_BRIDGE_PORT: 9000
