default_speaker: atri

speakers:
  atri:
    # Kokoro 可选字段（当 TTS_PROVIDER=kokoro 时生效）
    kokoro_voice: jf_alpha
    kokoro_model: kokoro
    kokoro_lang: en-us
    kokoro_response_format: wav
    kokoro_speed: 1.0

    # GPT-SoVITS 字段（当 TTS_PROVIDER=gpt_sovits 时生效）
    text_lang: ja
    prompt_lang: ja
    ref_audio_path: ./assets/voices/neutral.wav
    prompt_text: 夏生さんが私を海から引き上げてくれた時、なんとなく予感はしていました。
    text_split_method: cut5
    batch_size: 1
    media_type: wav
    streaming_mode: false
    top_k: 15
    top_p: 1.0
    temperature: 1.0
    speed_factor: 1.0
